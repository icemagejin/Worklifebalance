<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丙午甲午 - 八字合盘海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .poster {
            width: 375px;
            height: 812px;
            background: #FAFAFA;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        /* 现代国画写意背景 */
        .warm-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 183, 77, 0.3) 0%, rgba(255, 183, 77, 0.1) 50%, rgba(255, 183, 77, 0) 100%);
            top: 100px;
            right: -150px;
            border-radius: 50%;
        }

        .ink-line-1 {
            position: absolute;
            width: 250px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(144, 238, 144, 0.4), rgba(144, 238, 144, 0.3));
            top: 300px;
            left: 50px;
            border-radius: 50%;
            transform: rotate(10deg);
        }

        .ink-line-2 {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(144, 238, 144, 0.3), transparent);
            top: 380px;
            left: 80px;
            border-radius: 50%;
            transform: rotate(-5deg);
        }

        /* 超大数字 */
        .big-date {
            position: absolute;
            font-size: 240px;
            font-weight: 700;
            color: #2D2D2D;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            line-height: 1;
        }

        /* 极小字日期 */
        .small-date {
            position: absolute;
            font-size: 14px;
            font-weight: 300;
            color: #888888;
            top: 380px;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 1px;
        }

        /* 极小字干支 */
        .ganzhi {
            position: absolute;
            font-size: 14px;
            font-weight: 300;
            color: #888888;
            top: 405px;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 2px;
        }

        /* 祝福语 */
        .blessing {
            position: absolute;
            font-size: 18px;
            font-weight: 400;
            color: #2D2D2D;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            letter-spacing: 1px;
        }

        .blessing-line-1 {
            top: 550px;
        }

        .blessing-line-2 {
            top: 580px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 现代国画写意背景 -->
        <div class="warm-glow"></div>
        <div class="ink-line-1"></div>
        <div class="ink-line-2"></div>

        <!-- 超大数字 -->
        <div class="big-date">26</div>

        <!-- 极小字日期 -->
        <div class="small-date">MARCH THURSDAY</div>

        <!-- 极小字干支 -->
        <div class="ganzhi">丙午·甲午</div>

        <!-- 对仗祝福语 -->
        <div class="blessing blessing-line-1">丙火生辉开好运</div>
        <div class="blessing blessing-line-2">甲午得福展宏图</div>
    </div>
</body>
</html>
